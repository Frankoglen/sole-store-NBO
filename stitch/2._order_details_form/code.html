<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SOLE - Order Details</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary": "#00363b",
                        "tertiary-container": "#97f1fa",
                        "on-error-container": "#ffdad6",
                        "on-primary": "#303300",
                        "outline-variant": "#474834",
                        "inverse-surface": "#e5e2e1",
                        "surface-container-low": "#1c1b1b",
                        "inverse-primary": "#5e6300",
                        "inverse-on-surface": "#313030",
                        "primary-fixed-dim": "#c7cf28",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed-variant": "#004f55",
                        "tertiary": "#ffffff",
                        "surface-container-lowest": "#0e0e0e",
                        "tertiary-fixed-dim": "#7ad4dd",
                        "surface-tint": "#c7cf28",
                        "error-container": "#93000a",
                        "on-tertiary-container": "#006f77",
                        "surface-dim": "#131313",
                        "on-primary-fixed-variant": "#474a00",
                        "outline": "#92927b",
                        "on-secondary": "#303300",
                        "on-background": "#e5e2e1",
                        "surface-container-high": "#2a2a2a",
                        "on-primary-container": "#646900",
                        "primary": "#ffffff",
                        "surface-variant": "#353534",
                        "secondary-container": "#474a0f",
                        "secondary-fixed": "#e4e79c",
                        "on-surface-variant": "#c9c8ae",
                        "tertiary-fixed": "#97f1fa",
                        "secondary-fixed-dim": "#c8cb83",
                        "background": "#131313",
                        "primary-fixed": "#e3eb45",
                        "on-error": "#690005",
                        "on-primary-fixed": "#1c1d00",
                        "on-secondary-fixed": "#1c1d00",
                        "surface-container": "#201f1f",
                        "surface-bright": "#3a3939",
                        "surface-container-highest": "#353534",
                        "on-secondary-container": "#b7ba73",
                        "secondary": "#c8cb83",
                        "primary-container": "#e3eb45",
                        "surface": "#131313",
                        "on-surface": "#e5e2e1",
                        "on-secondary-fixed-variant": "#474a0f",
                        "on-tertiary-fixed": "#002022"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
        }
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: #e3eb45 !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body class="min-h-screen pb-24">
<!-- TopAppBar -->
<nav class="fixed top-0 left-0 w-full flex justify-between items-center px-8 py-6 bg-[#131313] opacity-95 z-50 shadow-[0_40px_40px_rgba(0,0,0,0.06)]">
<div class="text-2xl font-black tracking-tighter text-[#e3eb45] font-headline">SOLE</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-[#e3eb45] border-b-2 border-[#e3eb45] pb-1 font-body font-medium" href="#">Nairobi Kicks</a>
</div>
<div class="flex items-center gap-6 text-[#e5e2e1]">
<span class="material-symbols-outlined hover:text-[#e3eb45] transition-colors cursor-pointer" data-icon="shopping_cart">shopping_cart</span>
<span class="material-symbols-outlined hover:text-[#e3eb45] transition-colors cursor-pointer" data-icon="person">person</span>
</div>
</nav>
<main class="pt-32 px-6 max-w-2xl mx-auto">
<!-- Back Button & Progress -->
<div class="flex flex-col gap-10 mb-16">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary-fixed transition-colors group">
<span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-1" data-icon="arrow_back">arrow_back</span>
<span class="font-label uppercase tracking-widest text-[10px] font-bold">Return to Product</span>
</button>
<!-- Progress Indicator: 3 dots -->
<div class="flex items-center justify-center w-full max-w-xs mx-auto relative">
<div class="absolute h-[1px] w-full bg-surface-container-highest top-1/2 -translate-y-1/2 z-0"></div>
<div class="flex justify-between w-full relative z-10">
<div class="w-3 h-3 bg-surface-container-highest border border-surface-container-highest"></div>
<div class="w-3 h-3 bg-primary-fixed border border-primary-fixed ring-4 ring-primary-fixed/20"></div>
<div class="w-3 h-3 bg-surface-container-highest border border-surface-container-highest"></div>
</div>
</div>
</div>
<div class="grid grid-cols-1 gap-12">
<!-- Mini Order Summary Card -->
<section class="bg-surface-container p-6 flex gap-6 items-center">
<div class="w-24 h-24 bg-surface-container-highest flex-shrink-0">
<img alt="Air Force 1 Premium" class="w-full h-full object-cover" data-alt="Red Nike sneakers on a dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMKtR5C7m5JnzJuQneQ7JJMJoq2K3nu8RKdRS__YE_mhpr0Bnkc6PFk0qIWa_1eCxNqc-DoZqAhvtW_H3wFwG_P86R3Sk5DmAR91YfU8G72pRWMiVcS9ms2naiZwdD4xeyShmDqj1uBSigAis4TURsuEvDD0J8Msv10_aROaY29bp4P_rarSg-FbbwaLMFckhNlbcYj6PMISf5L4x5kGu2gc3gEkTvKlB1LZjmNg180Er3o2TUQ31SV0j71ua1fGHi7aCuabEMV9w"/>
</div>
<div class="flex-grow">
<h2 class="font-headline font-bold text-lg leading-tight mb-1">Air Force 1 Premium</h2>
<div class="flex justify-between items-baseline">
<p class="text-on-surface-variant font-label text-xs uppercase tracking-wider">Size: 42 EU</p>
<p class="font-headline font-bold text-primary-fixed">KES 3,500</p>
</div>
</div>
</section>
<!-- Order Form -->
<form action="https://tally.so/r/nairobi-kicks" class="space-y-8" method="POST">
<div class="grid grid-cols-1 gap-6">
<div class="group">
<label class="block font-label text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mb-2 group-focus-within:text-primary-fixed transition-colors">Full Name</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-surface-container-highest py-4 px-0 text-on-surface placeholder:text-surface-container-highest" name="name" placeholder="Enter your name" required="" type="text"/>
</div>
<div class="group">
<label class="block font-label text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mb-2 group-focus-within:text-primary-fixed transition-colors">Phone Number</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-surface-container-highest py-4 px-0 text-on-surface placeholder:text-surface-container-highest" name="phone" placeholder="07XX XXX XXX" required="" type="tel"/>
</div>
<div class="group">
<label class="block font-label text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mb-2 group-focus-within:text-primary-fixed transition-colors">Area / Location</label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-surface-container-highest py-4 px-0 text-on-surface placeholder:text-surface-container-highest" name="location" placeholder="Building, Street, Apartment" required="" type="text"/>
</div>
<div class="group">
<label class="block font-label text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mb-2 group-focus-within:text-primary-fixed transition-colors">Delivery Zone</label>
<select class="w-full bg-surface-container-lowest border-0 border-b border-surface-container-highest py-4 px-0 text-on-surface appearance-none cursor-pointer" id="delivery-select" name="delivery_zone" required="">
<option value="nairobi">Within Nairobi - Free</option>
<option value="outside">Outside Nairobi - KES 300-350</option>
</select>
</div>
<!-- Conditional Info Box -->
<div class="hidden bg-surface-container-low border-l-2 border-primary-fixed p-5 flex gap-4 items-start" id="outside-nairobi-info">
<span class="material-symbols-outlined text-primary-fixed" data-icon="info">info</span>
<p class="text-sm leading-relaxed text-on-surface-variant">
                            Mpesa payment collected before dispatch via PSV courier.
                        </p>
</div>
<div class="group">
<label class="block font-label text-[10px] uppercase tracking-widest font-bold text-on-surface-variant mb-2 group-focus-within:text-primary-fixed transition-colors">Optional Notes</label>
<textarea class="w-full bg-surface-container-lowest border-0 border-b border-surface-container-highest py-4 px-0 text-on-surface placeholder:text-surface-container-highest resize-none" name="notes" placeholder="Any specific instructions?" rows="2"></textarea>
</div>
</div>
<!-- Action Section -->
<div class="pt-8 space-y-4">
<button class="w-full bg-primary-fixed text-on-primary-fixed font-headline font-bold py-5 text-lg uppercase tracking-widest hover:bg-primary-fixed-dim transition-colors active:scale-[0.98]" type="submit">
                        Confirm Order
                    </button>
<div class="flex items-center justify-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="verified_user">verified_user</span>
<p class="text-[11px] font-label uppercase tracking-tighter">No payment on this page. You pay when we arrive.</p>
</div>
</div>
</form>
</div>
</main>
<!-- BottomNavBar (Hidden on desktop as per Shell rules) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-[#131313] border-t border-[#201f1f]">
<div class="flex flex-col items-center justify-center text-[#e5e2e1] p-2 hover:bg-[#1c1b1b] transition-colors">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="text-[10px] uppercase tracking-widest font-bold font-body">Shop</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e5e2e1] p-2 hover:bg-[#1c1b1b] transition-colors">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="text-[10px] uppercase tracking-widest font-bold font-body">Search</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e3eb45] p-2 bg-[#201f1f]">
<span class="material-symbols-outlined" data-icon="local_mall">local_mall</span>
<span class="text-[10px] uppercase tracking-widest font-bold font-body">Orders</span>
</div>
<div class="flex flex-col items-center justify-center text-[#e5e2e1] p-2 hover:bg-[#1c1b1b] transition-colors">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[10px] uppercase tracking-widest font-bold font-body">Profile</span>
</div>
</nav>
<!-- Logic for delivery zone visibility toggle -->
<script>
        document.getElementById('delivery-select').addEventListener('change', function() {
            const infoBox = document.getElementById('outside-nairobi-info');
            if (this.value === 'outside') {
                infoBox.classList.remove('hidden');
            } else {
                infoBox.classList.add('hidden');
            }
        });
    </script>
</body></html>
